<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kasir iOS Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kasir Pro">
    <link rel="apple-touch-icon" href="icons/apple-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="ios-header">
            <h1 class="app-title">Kasir<span>.Pro</span></h1>
            <div class="header-nav">
                <button class="nav-btn active" data-view="kasir">🧾 Kasir</button>
                <button class="nav-btn" data-view="produk">📦 Produk</button>
                <button class="nav-btn" data-view="laporan">📊 Laporan</button>
            </div>
        </header>

        <!-- VIEW KASIR -->
        <main class="main-content view" id="viewKasir">
            <!-- Konten kasir (sama seperti sebelumnya) -->
            <section class="product-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Cari produk..." class="ios-input">
                </div>
                <div class="category-filter">
                    <button class="category-btn active" data-cat="all">Semua</button>
                    <button class="category-btn" data-cat="makanan">Makanan</button>
                    <button class="category-btn" data-cat="minuman">Minuman</button>
                    <button class="category-btn" data-cat="snack">Snack</button>
                </div>
                <div id="productList" class="product-grid"></div>
            </section>
            <section class="cart-section">
                <h2>🛒 Keranjang</h2>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Total Item</span>
                        <span id="totalItems">0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Harga</span>
                        <span id="totalHarga">Rp 0</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <button id="bayarBtn" class="ios-button primary">Bayar</button>
                    <button id="resetBtn" class="ios-button secondary">Reset</button>
                </div>
            </section>
        </main>

        <!-- VIEW PRODUK (Manajemen Produk) -->
        <main class="main-content view" id="viewProduk" style="display: none;">
            <section class="product-management">
                <div class="management-header">
                    <h2>Manajemen Produk</h2>
                    <button id="tambahProdukBtn" class="ios-button primary">+ Tambah Produk</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchProdukInput" placeholder="Cari produk..." class="ios-input">
                </div>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Kategori</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <!-- diisi js -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- VIEW LAPORAN (Riwayat Transaksi) -->
        <main class="main-content view" id="viewLaporan" style="display: none;">
            <section class="report-section">
                <div class="report-header">
                    <h2>Riwayat Transaksi</h2>
                    <div class="report-actions">
                        <button id="exportExcelBtn" class="ios-button primary">📥 Export Excel</button>
                        <button id="cetakLaporanBtn" class="ios-button secondary">🖨️ Cetak Laporan</button>
                    </div>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchLaporanInput" placeholder="Cari transaksi..." class="ios-input">
                </div>
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tanggal</th>
                            <th>Total Item</th>
                            <th>Total Harga</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <!-- diisi js -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- MODAL Bayar -->
        <div id="modalBayar" class="ios-modal">
            <div class="modal-content">
                <h3>Pembayaran</h3>
                <p>Total Belanja: <strong id="modalTotal">Rp 0</strong></p>
                <input type="number" id="jumlahBayar" class="ios-input" placeholder="Jumlah bayar" autofocus>
                <p>Kembalian: <strong id="kembalian">Rp 0</strong></p>
                <div class="modal-actions">
                    <button id="prosesBayarBtn" class="ios-button primary">Proses</button>
                    <button id="tutupModalBtn" class="ios-button secondary">Tutup</button>
                </div>
            </div>
        </div>

        <!-- MODAL Tambah/Edit Produk -->
        <div id="modalProduk" class="ios-modal">
            <div class="modal-content">
                <h3 id="modalProdukTitle">Tambah Produk</h3>
                <input type="text" id="produkNama" class="ios-input" placeholder="Nama Produk">
                <select id="produkKategori" class="ios-input">
                    <option value="makanan">Makanan</option>
                    <option value="minuman">Minuman</option>
                    <option value="snack">Snack</option>
                </select>
                <input type="number" id="produkHarga" class="ios-input" placeholder="Harga">
                <input type="number" id="produkStok" class="ios-input" placeholder="Stok">
                <div class="modal-actions">
                    <button id="simpanProdukBtn" class="ios-button primary">Simpan</button>
                    <button id="batalProdukBtn" class="ios-button secondary">Batal</button>
                </div>
            </div>
        </div>

        <!-- MODAL Cetak Struk / Detail Transaksi -->
        <div id="modalStruk" class="ios-modal">
            <div class="modal-content struk-content">
                <h3>Struk Pembayaran</h3>
                <div id="detailTransaksi"></div>
                <div class="modal-actions">
                    <button id="cetakStrukBtn" class="ios-button primary">🖨️ Cetak</button>
                    <button id="tutupStrukBtn" class="ios-button secondary">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
